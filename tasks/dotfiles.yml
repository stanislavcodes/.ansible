- name: installing stow
  dnf: name=stow
  tags:
    - install
    - dotfiles
    - stow
- name: cloning .dotfiles
  git:
    repo: 'git@github.com:stanislavcodes/.dotfiles.git'
    dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: main
  tags:
    - install
    - dotfiles
    - stow
- name: stow dotfiles
  shell: cd $HOME/.dotfiles && ./fedora
  tags:
    - install
    - dotfiles
    - stow
